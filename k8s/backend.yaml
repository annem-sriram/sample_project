apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: yourusername/backend:v1 # Replace with your Docker Hub username
        ports:
        - containerPort: 5000
        env:
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:8080"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30005 # Accessible via EC2 Public IP:30005
  type: NodePort
